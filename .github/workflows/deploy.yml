name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for OIDC: id-token to mint the GitHub token AWS exchanges for the role.
permissions:
  id-token: write
  contents: read

# Never run two deploys against the same environment at once.
concurrency:
  group: deploy-raftaar
  cancel-in-progress: false

env:
  AWS_REGION: ap-south-1
  CDK_VERSION: 2.1126.0

jobs:
  deploy:
    name: build + cdk deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/api/go.mod
          cache-dependency-path: services/api/go.sum

      # Cross-compile the Lambda binary the CDK stack packages as its asset.
      - name: Build Lambda binary
        working-directory: services/api
        run: make build

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install AWS CDK
        run: npm install -g "aws-cdk@${{ env.CDK_VERSION }}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK deploy
        working-directory: infra
        run: cdk deploy --require-approval never --no-rollback
